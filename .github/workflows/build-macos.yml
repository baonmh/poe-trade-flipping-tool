# Build a macOS onedir bundle (PyInstaller). Artifact for testing; Releases use release.yml on tags.
name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app.py"
      - "poe-trade-flipping.spec"
      - "requirements.txt"
      - "requirements-build.txt"
      - "templates/**"
      - "static/**"
      - "api/**"
      - "analysis/**"
      - ".github/workflows/**"

jobs:
  pyinstaller:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install deps + PyInstaller
        run: pip install -r requirements-build.txt

      - name: Build
        run: pyinstaller poe-trade-flipping.spec

      - name: SHA256 (binary)
        run: |
          cd dist/poe-trade-flipping
          shasum -a 256 poe-trade-flipping | tee SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: poe-trade-flipping-macos
          path: dist/poe-trade-flipping/
